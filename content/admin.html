<!DOCTYPE html>
<html lang="zh-CN"><head>
    <meta charset="UTF-8">
    <title>管理员后台 - SmartNexus - 智慧网络导航系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS 文件 -->
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <header>
        <button class="btn-back" onclick="window.location.href='index.html'">返回首页</button>
        <h1>管理员后台 - 建筑信息管理</h1>
        <div class="admin-actions">
            <button class="btn-announcement" onclick="showAnnouncementModal()">新建公告</button>
            <button class="btn-feedback" onclick="window.location.href='index.html#viewFeedback'">查看反馈</button>
            <button class="btn-refresh" onclick="loadBuildings()">刷新数据</button>
        </div>
    </header>
    <div class="container">
        <div class="panel">
            <h2>建筑搜索</h2>
            <div class="search-bar">
                <input type="text" id="adminSearchInput" placeholder="输入建筑名称实时搜索" />
                <button onclick="filterBuildings()">搜索</button>
            </div>
        </div>
        <!-- 建筑信息维护弹窗 -->
        <div id="buildingModal" class="modal">
            <div class="modal-content" style="max-width: 800px;">
                <h3 id="buildingModalTitle">建筑信息维护</h3>
                <div class="form-grid" style="max-width: 100%;">
                    <div>
                        <label for="formId">ID</label>
                        <input type="text" id="formId" readonly placeholder="新建建筑时自动生成" />
                    </div>
                    <div>
                        <label for="formName">名称</label>
                        <input type="text" id="formName" />
                    </div>
                    <div>
                        <label for="formType">类型</label>
                        <input type="text" id="formType" />
                    </div>
                    <div>
                        <label for="formAddress">地址</label>
                        <input type="text" id="formAddress" />
                    </div>
                    <div>
                        <label for="formStatus">状态</label>
                        <select id="formStatus">
                            <option value="运行">运行</option>
                            <option value="停用">停用</option>
                            <option value="新建">新建</option>
                            <option value="规划中">规划中</option>
                            <option value="改造中">改造中</option>
                        </select>
                    </div>
                    <div>
                        <label for="formWebsite">官方网站</label>
                        <input type="text" id="formWebsite" />
                    </div>
                </div>
                <!-- 网站入口管理区域 -->
                <div style="margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <h4 style="margin: 0; color: #333;">网站入口</h4>
                        <button type="button" class="btn-add-website" onclick="addWebsiteEntry()" style="padding: 8px 16px; background: #4caf50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">+ 添加入口</button>
                    </div>
                    <div id="websiteEntriesContainer">
                        <!-- 网站入口输入框将动态添加到这里 -->
                    </div>
                </div>
                <div class="status-box" id="adminStatusBox" style="margin-top: 15px;"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeBuildingModal()">取消</button>
                    <button type="button" class="btn-submit" id="buildingModalSubmitBtn" onclick="submitBuildingForm()">提交</button>
                </div>
            </div>
        </div>
        
        <!-- 删除建筑确认弹窗 -->
        <div id="deleteModal" class="modal">
            <div class="modal-content" style="max-width: 500px;">
                <h3>确认删除</h3>
                <div style="margin-bottom: 20px; font-size: 16px; color: #333;">
                    <p id="deleteConfirmMessage">确定要删除该建筑吗？</p>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-delete-confirm-cancel" onclick="closeDeleteModal()">取消</button>
                    <button type="button" class="btn-delete-confirm-submit" onclick="confirmDelete()">确定</button>
                </div>
            </div>
        </div>
        
        <!-- 新建公告弹窗 -->
        <div id="announcementModal" class="modal">
            <div class="modal-content">
                <h3>新建公告</h3>
                <div class="form-group">
                    <label for="announcementTitle">公告标题</label>
                    <input type="text" id="announcementTitle" placeholder="请输入公告标题" />
                </div>
                <div class="form-group">
                    <label for="announcementContent">公告内容</label>
                    <textarea id="announcementContent" rows="6" placeholder="请输入公告内容"></textarea>
                </div>
                <div class="feedback-status" id="announcementStatus"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeAnnouncementModal()">取消</button>
                    <button type="button" class="btn-submit" onclick="submitAnnouncement()">发布公告</button>
                </div>
            </div>
        </div>
        
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin: 0;">建筑列表<span id="buildingCount" style="color: #666; font-size: 0.8em; font-weight: normal; margin-left: 10px;"></span></h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-add" onclick="openBuildingModal('add')">新建建筑</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>类型</th>
                        <th>地址</th>
                        <th>状态</th>
                        <th style="text-align: right; padding-right: 60px;">操作</th>
                    </tr>
                </thead>
                <tbody id="adminBuildingsTableBody"></tbody>
            </table>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2025 SmartNexus - 智慧网络导航系统 | 徐子康团队版权所有</p>
    </footer>
    
    <!-- 登录弹窗 -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>管理员登录</h3>
            <form id="loginForm" onsubmit="event.preventDefault(); submitLogin();">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" name="username" autocomplete="username" placeholder="请输入管理员用户名" required />
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" name="password" autocomplete="current-password" placeholder="请输入密码" required />
                </div>
                <div class="feedback-status" id="loginStatus"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeLoginModal()">取消</button>
                    <button type="submit" class="btn-submit">登录</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript 文件 -->
    <script src="admin.js"></script>

</body>
</html>
